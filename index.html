<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

<body>

	<h1>JavaScript Conditional Statements</h1>
	<button class="btn btn-info" onclick="checkAge()"></button>

	<script>
		//checkAge
		function checkAge(){
		if (15 < 18){
			alert("You are underage.");
		}
		else if (21 > 18){
			alert("You are of legal age.");
		}
		else {
			alert("Your age could not be classified.");
		}
	}
	</script>


</body>
</html>
