<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<title>Q4 Practice1</title>
</head>
<body>

	<h1>JavaScript Conditional Statements</h1>

	<input type="text" id="Age" class="form-control" placeholder="Enter age here...">
	<br><br>
	<button class="btn btn-info px-4 py-2" onclick="checkAge()">
		Check Age
	</button>

	<script>
		//checkAge
		function checkAge(){

			var age = document.getElementById("Age").value;

		if(isNaN(age) || age < 0 ){
			alert("Please input a valid number.");
		}

		if (age < 18){
			alert("You are underage.");
		}
		else if (age > 18){
			alert("You are of legal age.");
		}
		else {
			alert("Your age could not be classified.");
		}
	}
	</script>


</body>
</html>
